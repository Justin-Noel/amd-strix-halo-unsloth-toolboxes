name: Build and publish toolboxes

on:
  workflow_dispatch:
    inputs:
      variants:
        description: "Comma-separated variants to build, or 'all'"
        required: false
        default: "all"
  push:
    branches: [main]
    paths:
      - "toolboxes/**"
      - "scripts/**"
      - ".github/workflows/build-and-publish.yml"

env:
  IMAGE_REPO: ghcr.io/justin-noel/amd-strix-halo-unsloth-toolboxes

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          ALL='["rocm-7.2"]'
          INPUT="${{ github.event.inputs.variants }}"
          if [ -z "$INPUT" ] || [ "$INPUT" = "all" ]; then
            echo "matrix=$ALL" >> "$GITHUB_OUTPUT"
          else
            echo "matrix=$(echo "$INPUT" | jq -Rc 'split(",") | map(gsub("^\\s+|\\s+$"; ""))')" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        variant: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      # The Studio venv is ~20+ GiB; reclaim runner disk first
      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          sudo docker system prune -af || true
          df -h /

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build \
            -f "toolboxes/Dockerfile.${{ matrix.variant }}" \
            -t "$IMAGE_REPO:${{ matrix.variant }}" \
            .

      # No GPU on runners: verify the ROCm torch build and the Studio CLI only.
      - name: Smoke test
        run: |
          docker run --rm "$IMAGE_REPO:${{ matrix.variant }}" \
            /opt/unsloth/studio/unsloth_studio/bin/python -c \
            "import torch; assert torch.version.hip, torch.__version__; print('torch', torch.__version__, 'HIP', torch.version.hip)"
          docker run --rm "$IMAGE_REPO:${{ matrix.variant }}" \
            /opt/unsloth/studio/unsloth_studio/bin/unsloth studio --help > /dev/null
          echo "Smoke test passed"

      - name: Push tags
        run: |
          TS="$(date +%Y%m%dT%H%M%S)"
          docker tag "$IMAGE_REPO:${{ matrix.variant }}" "$IMAGE_REPO:${{ matrix.variant }}_$TS"
          docker push "$IMAGE_REPO:${{ matrix.variant }}"
          docker push "$IMAGE_REPO:${{ matrix.variant }}_$TS"
